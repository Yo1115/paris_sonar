name: Notify Power Automate

on:
  workflow_call:
    inputs:
      event_type:
        required: true
        type: string
      status:
        required: true
        type: string
      environment:
        required: false
        default: ""
        type: string
      summary:
        required: true
        type: string
      notify_emails:
        required: true
        type: string
      details_json:
        required: false
        default: "{}"
        type: string
    secrets:
      PA_WEBHOOK_URL:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    environment: RESPONSIBLE_EMAIL
    steps:
      - name: Send notification to Power Automate
        env:
          PA_URL: ${{ secrets.PA_WEBHOOK_URL }}
        run: |
          NOTIFY_EMAILS='${{ inputs.notify_emails }}'
          DETAILS_JSON='${{ inputs.details_json }}'
          FALLBACK_EMAIL='${{ vars.RESPONSIBLE_EMAIL }}'

          if echo "$NOTIFY_EMAILS" | jq -e 'type == "array" and length == 0' > /dev/null; then
            if [ -n "$FALLBACK_EMAIL" ]; then
              NOTIFY_EMAILS=$(jq -cn --arg email "$FALLBACK_EMAIL" '[$email]')
            fi
          fi

          if ! echo "$NOTIFY_EMAILS" | jq -e 'type == "array" and all(.[]; type == "string" and length > 0)' > /dev/null; then
            echo "::warning::notify_emails must be a JSON array of non-empty strings. Received: $NOTIFY_EMAILS"
            exit 0
          fi

          if ! echo "$DETAILS_JSON" | jq -e 'type == "object"' > /dev/null; then
            echo "::warning::details_json must be a JSON object. Falling back to {}. Received: $DETAILS_JSON"
            DETAILS_JSON='{}'
          fi

          PAYLOAD=$(jq -cn \
            --arg event_type "${{ inputs.event_type }}" \
            --arg status "${{ inputs.status }}" \
            --arg repository "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg environment "${{ inputs.environment }}" \
            --arg actor "${{ github.actor }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg summary "${{ inputs.summary }}" \
            --argjson notify_emails "$NOTIFY_EMAILS" \
            --argjson details "$DETAILS_JSON" \
            '{
              event_type: $event_type,
              status: $status,
              repository: $repository,
              branch: $branch,
              environment: $environment,
              actor: $actor,
              run_url: $run_url,
              summary: $summary,
              notify_emails: $notify_emails,
              details: $details
            }')

          echo "Payload to Power Automate:"
          echo "$PAYLOAD"

          set +e
          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$PA_URL")
          CURL_EXIT=$?
          set -e

          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::warning::Power Automate notification request failed (curl exit $CURL_EXIT)"
            exit 0
          fi

          echo "Power Automate response: $HTTP_CODE"
          if [ -f response.txt ]; then
            cat response.txt
          fi

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::Power Automate notification failed with HTTP $HTTP_CODE"
          fi
