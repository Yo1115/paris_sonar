name: SBOM JSON to PDF Report

on:
  push:
    branches:
      - main
      - develop
    paths:
      - sbom_to_pdf.py
      - .github/workflows/sbom-pdf-report.yml
  pull_request:
    branches:
      - main
    paths:
      - sbom_to_pdf.py
      - .github/workflows/sbom-pdf-report.yml
  workflow_dispatch:

jobs:
  generate-pdf-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: cyclonedx
          output: sbom.cdx.json
          exit-code: "0"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CJK fonts for PDF rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate PDF report from SBOM JSON
        run: python sbom_to_pdf.py sbom.cdx.json sbom-report.pdf

      - name: Upload PDF report artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-pdf-report-${{ github.sha }}
          path: sbom-report.pdf
          retention-days: 90
