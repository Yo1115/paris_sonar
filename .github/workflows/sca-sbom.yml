name: SCA and SBOM

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM (CycloneDX)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: cyclonedx
          output: sbom.cdx.json
          exit-code: "0"

      - name: Setup Python
        if: always()
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CJK fonts for PDF rendering
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        if: always()
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/scripts/requirements-sbom.txt

      - name: Inject repo metadata into SBOM JSON
        if: always()
        run: |
          python3 .github/scripts/inject-sbom-metadata.py \
            sbom.cdx.json \
            "${{ github.repository }}" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}"

      - name: Generate PDF report from SBOM JSON
        if: always()
        run: python .github/scripts/sbom_to_pdf.py sbom.cdx.json sbom-report.pdf

      - name: Rename report files with repo and timestamp
        if: always()
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TIMESTAMP="$(date -u -d '+8 hours' +'%Y%m%d-%H%M')"

          PDF_FILE="${REPO_NAME}-sbom-report-${TIMESTAMP}.pdf"
          SBOM_FILE="${REPO_NAME}-sbom-cdx-${TIMESTAMP}.json"
          SARIF_FILE="${REPO_NAME}-vuln-scan-${TIMESTAMP}.sarif"

          mv sbom-report.pdf "$PDF_FILE"
          mv sbom.cdx.json "$SBOM_FILE"
          mv trivy-results.sarif "$SARIF_FILE"

          echo "PDF_FILE=$PDF_FILE" >> "$GITHUB_ENV"
          echo "SBOM_FILE=$SBOM_FILE" >> "$GITHUB_ENV"
          echo "SARIF_FILE=$SARIF_FILE" >> "$GITHUB_ENV"

      - name: Upload security report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.sha }}
          path: |
            ${{ env.SARIF_FILE }}
            ${{ env.SBOM_FILE }}
            ${{ env.PDF_FILE }}
          retention-days: 90
